apiVersion: v1
kind: Secret
metadata:
  name: arksaas-runtime-secrets
type: Opaque
stringData:
  ConnectionStrings__Admin: Server=sql.example.internal,1433;Database=ARKSAAS_ADMIN;User Id=sa;Password=CHANGE_ME;TrustServerCertificate=True;
  ConnectionStrings__Identity: Server=sql.example.internal,1433;Database=ARKSAAS_IDENTITY;User Id=sa;Password=CHANGE_ME;TrustServerCertificate=True;
  ConnectionStrings__Billing: Server=sql.example.internal,1433;Database=ARKSAAS_BILLING;User Id=sa;Password=CHANGE_ME;TrustServerCertificate=True;
  ConnectionStrings__Notification: Server=sql.example.internal,1433;Database=ARKSAAS_NOTIFICATION;User Id=sa;Password=CHANGE_ME;TrustServerCertificate=True;
  ConnectionStrings__Permission: Server=sql.example.internal,1433;Database=ARKSAAS_PERMISSION;User Id=sa;Password=CHANGE_ME;TrustServerCertificate=True;
  ConnectionStrings__ServerProvisioning: Server=sql.example.internal,1433;Database=ARKSAAS_SERVER_PROVISIONING;User Id=sa;Password=CHANGE_ME;TrustServerCertificate=True;
  ConnectionStrings__Agent: Server=sql.example.internal,1433;Database=ARKSAAS_AGENT;User Id=sa;Password=CHANGE_ME;TrustServerCertificate=True;
  ConnectionStrings__MongoDB: mongodb://arksaas:CHANGE_ME@mongo.example.internal:27017/arksaas?authSource=admin&retryWrites=true&w=majority
  ConnectionStrings__Redis: redis.example.internal:6379,password=CHANGE_ME,abortConnect=false
  InternalApi__ApiKey: change-me-strong-internal-api-key
  Services__Agent__InternalApiKey: change-me-strong-internal-api-key
  Stripe__SecretKey: sk_live_change_me
  Stripe__WebhookSigningSecret: whsec_change_me
  Seq__ApiKey: change-me-seq-api-key

