apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arksaas-gateway
spec:
  ingressClassName: traefik
  rules:
    - host: api.arksaas.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 80

