apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: billing-service
    spec:
      serviceAccountName: arksaas-sa
      initContainers:
        - name: migrate-billing
          image: ghcr.io/hantse/arksaas-billing-service:f71f9c230f2fa3d8716f5ac7a06f89e4dea17bcc
          imagePullPolicy: IfNotPresent
          env:
            - name: Startup__RunDatabaseMigrationsOnly
              value: "true"
          envFrom:
            - configMapRef:
                name: arksaas-public-config
            - secretRef:
                name: arksaas-runtime-secrets
          volumeMounts:
            - name: firebase-admin
              mountPath: /var/run/secrets/arksaas/firebase
              readOnly: true
      containers:
        - name: billing-service
          image: ghcr.io/hantse/arksaas-billing-service:f71f9c230f2fa3d8716f5ac7a06f89e4dea17bcc
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 8081
          env:
            - name: BillingDatabase__ApplyMigrationsOnStartup
              value: "false"
          envFrom:
            - configMapRef:
                name: arksaas-public-config
            - secretRef:
                name: arksaas-runtime-secrets
          volumeMounts:
            - name: firebase-admin
              mountPath: /var/run/secrets/arksaas/firebase
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: firebase-admin
          secret:
            secretName: firebase-admin
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
spec:
  selector:
    app.kubernetes.io/name: billing-service
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 8081
      targetPort: grpc

