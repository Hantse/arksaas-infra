apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-service
    spec:
      serviceAccountName: arksaas-sa
      containers:
        - name: llm-service
          image: ghcr.io/your-org/arksaas-llm-service:0000000000000000000000000000000000000000
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: arksaas-public-config
            - secretRef:
                name: arksaas-runtime-secrets
          volumeMounts:
            - name: firebase-admin
              mountPath: /var/run/secrets/arksaas/firebase
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: firebase-admin
          secret:
            secretName: firebase-admin
---
apiVersion: v1
kind: Service
metadata:
  name: llm-service
spec:
  selector:
    app.kubernetes.io/name: llm-service
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 8081
      targetPort: grpc

