apiVersion: apps/v1
kind: Deployment
metadata:
  name: orkestrix-frontend
spec:
  replicas: 3
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orkestrix-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orkestrix-frontend
    spec:
      serviceAccountName: arksaas-sa
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: orkestrix-frontend
          image: ghcr.io/hantse/orkestrix-frontend:sha-9baac66fa5fedb4a3b25024df163dadd1b3e128e
          ports:
            - name: http
              containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.100.211
  selector:
    app.kubernetes.io/name: orkestrix-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
