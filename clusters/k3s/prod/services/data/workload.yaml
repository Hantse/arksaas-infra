apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: data-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: data-service
    spec:
      serviceAccountName: arksaas-sa
      containers:
        - name: data-service
          image: ghcr.io/hantse/arksaas-data-service:0000000000000000000000000000000000000000
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: arksaas-public-config
            - secretRef:
                name: arksaas-runtime-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: data-service
spec:
  selector:
    app.kubernetes.io/name: data-service
  ports:
    - name: http
      port: 8080
      targetPort: http

