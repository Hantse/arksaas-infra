apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: arksaas-prod-updater
  namespace: argocd
spec:
  namespace: argocd
  commonUpdateSettings:
    updateStrategy: newest-build
  writeBackConfig:
    method: git
    gitConfig:
      writeBackTarget: kustomization
  applicationRefs:
    - namePattern: arksaas-prod
      images:
        - alias: gateway
          imageName: ghcr.io/your-org/arksaas-gateway
          commonUpdateSettings:
            allowTags: regexp:^[0-9a-f]{40}$
            updateStrategy: newest-build
          manifestTargets:
            kustomize:
              name: ghcr.io/your-org/arksaas-gateway
        - alias: admin
          imageName: ghcr.io/your-org/arksaas-admin-service
          commonUpdateSettings:
            allowTags: regexp:^[0-9a-f]{40}$
            updateStrategy: newest-build
          manifestTargets:
            kustomize:
              name: ghcr.io/your-org/arksaas-admin-service
        - alias: agent
          imageName: ghcr.io/your-org/arksaas-agent-service
          commonUpdateSettings:
            allowTags: regexp:^[0-9a-f]{40}$
            updateStrategy: newest-build
          manifestTargets:
            kustomize:
              name: ghcr.io/your-org/arksaas-agent-service
        - alias: billing
          imageName: ghcr.io/your-org/arksaas-billing-service
          commonUpdateSettings:
            allowTags: regexp:^[0-9a-f]{40}$
            updateStrategy: newest-build
          manifestTargets:
            kustomize:
              name: ghcr.io/your-org/arksaas-billing-service
        - alias: data
          imageName: ghcr.io/your-org/arksaas-data-service
          commonUpdateSettings:
            allowTags: regexp:^[0-9a-f]{40}$
            updateStrategy: newest-build
          manifestTargets:
            kustomize:
              name: ghcr.io/your-org/arksaas-data-service
        - alias: identity
          imageName: ghcr.io/your-org/arksaas-identity-service
          commonUpdateSettings:
            allowTags: regexp:^[0-9a-f]{40}$
            updateStrategy: newest-build
          manifestTargets:
            kustomize:
              name: ghcr.io/your-org/arksaas-identity-service
        - alias: llm
          imageName: ghcr.io/your-org/arksaas-llm-service
          commonUpdateSettings:
            allowTags: regexp:^[0-9a-f]{40}$
            updateStrategy: newest-build
          manifestTargets:
            kustomize:
              name: ghcr.io/your-org/arksaas-llm-service
        - alias: notification
          imageName: ghcr.io/your-org/arksaas-notification-service
          commonUpdateSettings:
            allowTags: regexp:^[0-9a-f]{40}$
            updateStrategy: newest-build
          manifestTargets:
            kustomize:
              name: ghcr.io/your-org/arksaas-notification-service
        - alias: permission
          imageName: ghcr.io/your-org/arksaas-permission-service
          commonUpdateSettings:
            allowTags: regexp:^[0-9a-f]{40}$
            updateStrategy: newest-build
          manifestTargets:
            kustomize:
              name: ghcr.io/your-org/arksaas-permission-service
        - alias: server-provisioning
          imageName: ghcr.io/your-org/arksaas-server-provisioning-service
          commonUpdateSettings:
            allowTags: regexp:^[0-9a-f]{40}$
            updateStrategy: newest-build
          manifestTargets:
            kustomize:
              name: ghcr.io/your-org/arksaas-server-provisioning-service

